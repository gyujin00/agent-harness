# eval/thresholds.yaml — RAG 회귀 기준선 (단일 원본)
# verifier가 이 기준을 넘지 못하면 ai.loop.yaml의 verify를 실패시킨다.
# 기준선 상향은 개선의 증거이자 record 대상. 하향은 ADR 필수.

retrieval_at_k:      0.80      # top-k 안에 정답 청크가 들어온 비율
faithfulness:        0.85      # 생성 답변이 검색 근거에 충실한 정도 (환각 억제)
answer_relevancy:    0.80      # 답변이 질문에 실제로 답한 정도

# 실행 파라미터 (변경 시 ADR)
config:
  top_k:            5
  retriever:        mmr                        # mmr | similarity
  embedding_model:  text-embedding-3-small      # OpenAI Embedding API — docs/decisions/ADR-006 계승
  llm_model:        gpt-4o-mini                # FAQ 답변 생성(FR-017) — docs/decisions/ADR-006
  chunk_size:       512
  chunk_overlap:    64
