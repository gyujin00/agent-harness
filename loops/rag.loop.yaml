# loops/rag.loop.yaml
# $ref: ./_loop.schema.yaml (loop.spec/v1)
# ★ 핵심 도메인: verify가 비결정적이라 eval 하네스(eval/)가 통과 기준을 대신한다.

target:
  paths:  [ai/]
  labels: ["area:ai", "area:rag"]
  extra:
    prompts:  [ai/prompts/]
    eval_set: [eval/rag-eval-set.jsonl]

trigger:
  - { type: human.goal,  detail: "RAG 기능 목표 지정 → Goal loop" }
  - { type: signal,      detail: "새 문서 인제스트 → 인덱스 갱신 후 재평가" }
  - { type: signal,      detail: "prompt 변경 → 회귀 평가" }
  - { type: signal,      detail: "eval.score.regressed → 자동 개선 루프(Ops)" }

action:
  agent:    rag-worker
  worktree: true

verify:
  gates:                                   # eval/thresholds.yaml 기준선과 비교
    - retrieval@k     >= thresholds.retrieval_at_k
    - faithfulness    >= thresholds.faithfulness      # 환각 억제
    - answer_relevancy >= thresholds.answer_relevancy
    - "기준선 미달 → 실패로 판정하고 action으로 되돌림"
  verifier: verifier          # rag-worker가 자기 결과를 self-eval 하지 않음
  on_fail:  back_to_action

record:
  outputs: [PR, "eval 리포트 (before/after diff)"]
  memory:
    - docs/harness-log.md
    - "docs/decisions/ADR-XXX-*.md (임베딩 모델·청크 전략·Top-K 변경 시)"
  required: true
