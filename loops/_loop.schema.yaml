# loops/_loop.schema.yaml — loop.spec 공통 스키마 (단일 원본)
# 모든 {domain}.loop.yaml 은 이 5요소를 채운다. (이미지: loop engineering spec)

$schema: loop.spec/v1

fields:
  target:                       # 무엇을 볼 것인가
    paths:      [string]        #   감시/작업 대상 디렉토리
    labels:     [string]        #   트리거로 삼을 이슈 라벨 (선택)
    extra:      map             #   도메인 고유 대상 (contracts, tokens, eval_set 등)

  trigger:                      # 언제 실행할 것인가
    type:       enum            #   human.goal | issue.created | pr.opened | schedule | signal
    detail:     string

  action:                       # 무엇을 처리할 것인가
    agent:      string          #   위임할 worker (work ≠ verify 원칙)
    worktree:   bool            #   격리 실행 여부 (기본 true)

  verify:                       # 잘됐는지 어떻게 확인할 것인가
    gates:      [check]         #   통과해야 하는 검증 게이트 목록
    verifier:   string          #   판정 Agent (worker와 반드시 다름)
    on_fail:    enum            #   retry | back_to_action | escalate

  record:                       # 무엇을 남길 것인가
    outputs:    [string]        #   PR, 리포트, 스크린샷 등
    memory:     [string]        #   docs/harness-log.md, ADR 등
    required:   true            #   record는 생략 불가

loop_kind:                      # 같은 spec, 다른 초점 (이미지: same word, different runtime)
  goal_loop: "trigger.type == human.goal → 조건 만족 시 종료"
  ops_loop:  "trigger.type == schedule|signal → 일감 소진 시 종료"
